name: NokoTracker
version: "0.1.1"
slug: noko_tracker
description: Private Heim-ERP-App mit Vorrat, Rezepten, Mahlzeiten, Kalender und Einkaufsliste.
url: https://github.com/Noko-png/NokoTracker/tree/home-assistant-addon
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8000
ingress_entry: /
panel_icon: mdi:home-analytics
panel_title: NokoTracker
ports:
  8000/tcp: null
ports_description:
  8000/tcp: NokoTracker Web UI und API
watchdog: http://[HOST]:[PORT:8000]/health
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
